name: Release version

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  version-matches-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check application version matches tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          APP_VERSION=$(sed -n "s/.*APP_VERSION = '\([^']*\)'.*/\1/p" assets/version.js | head -n 1)
          test "v${APP_VERSION}" = "${RELEASE_TAG}"
